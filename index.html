<!DOCTYPE html>
<html lang="zh-Hant" data-theme="day">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>孫孫塔羅 Mascot Tarot</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* ==========================================
           1. 高階視覺美學與色彩系統
           ========================================== */
        :root {
            --bg-color: #fffef7;
            --text-color: #302814;
            --gold-primary: #dbba18;
            --gold-light: #faf6cf;
            --panel-bg: rgba(248, 247, 244, 0.95);
            --border-thin: 1px solid rgba(182, 154, 104, 0.3);
            --glass-shadow: 0 -10px 40px rgba(0,0,0,0.03);
            --input-bg: rgba(0,0,0,0.02);
            --card-shadow: rgba(182, 154, 104, 0.25);
            --card-shadow-hover: rgba(182, 154, 104, 0.45);
        }

        [data-theme="night"] {
            --bg-color: #121212;
            --text-color: #EAE6DF;
            --gold-primary: #dbba18;
            --gold-light: #ad9417;
            --panel-bg: rgba(22, 22, 22, 0.95);
            --border-thin: 1px solid rgba(212, 175, 55, 0.3);
            --glass-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            --input-bg: rgba(255,255,255,0.03);
            --card-shadow: rgba(212, 175, 55, 0.15);
            --card-shadow-hover: rgba(212, 175, 55, 0.35);
        }

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden; 
    position: fixed; /* 關鍵：鎖定整個視窗，解決位移 */
    top: 0;
    left: 0;
    touch-action: none; /* 禁用外層所有的原生觸控行為（包含雙指縮放） */
}
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
            pointer-events: none; z-index: -1;
        }

        /* ==========================================
           2. 全域安全防護
           ========================================== */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Georgia', 'Noto Serif TC', serif;
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            height: 100vh; width: 100vw; overflow: hidden;
            transition: background-color 0.8s ease, color 0.8s ease;
padding-bottom: env(safe-area-inset-bottom);
        }

        img, .card-face { pointer-events: none; -webkit-user-drag: none; user-select: none; filter: blur(0.4px) contrast(105%); -webkit-touch-callout: none;}
        ::-webkit-scrollbar { display: none; }

#qr-code img, .no-protect {
    filter: none !important;
    pointer-events: auto !important;
}
        .nav-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%; height: 50px;
            padding: 0px 20px;
	height: 10vh;display: block;
            align-items: center;
            z-index: 9999; background: transparent;
        }


        .watermark {
            font-size: 0.5rem; position: absolute;
    left: 3vw; top: 50%;
    transform: translateY(-50%);
            color: var(--gold-primary); opacity: 0.5; letter-spacing: 1px;
            pointer-events: none; z-index: -1; font-style: italic;
        }

        .home-title {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%); white-space: nowrap;pointer-events: none;
            font-size: clamp(0.5rem, 5vh, 1rem); 
            letter-spacing: 3px;
            font-weight: 300;
            color: var(--gold-primary);
            text-transform: uppercase;
            opacity: 0; 
            visibility: hidden;
            transition: opacity 1.2s ease, visibility 1.2s ease;
            animation: pureGlow 7s infinite ease-in-out;
        }
@keyframes pureGlow {
    0%, 100% { 
        text-shadow: 0 0 5px rgba(224, 197, 63, 0.2);
        letter-spacing: 3px;
    }
    50% { 
        text-shadow: 0 0 20px rgba(224, 197, 63, 0.6), 0 0 30px rgba(224, 197, 63, 0.2);
        letter-spacing: 3.5px; /* 輕微的字距擴張也很有高級感 */
    }
}
        #main-page[style*="opacity: 1"] ~ .nav-header .home-title,
        .show-home-title .home-title { 
            opacity: 1 ;
            visibility: visible; 
        }

        .theme-toggle {
            background: transparent; position: absolute;
    right: 3vw;     top: 50%;
    transform: translateY(-50%);width: 33px;height: 30px;
            border: var(--border-thin); color: var(--gold-primary);
            padding: 0; font-size: 0.65rem; display: flex;
    align-items: center; justify-content: center; cursor: pointer; z-index: 9999; text-transform: uppercase;
            transition: 0.4s ease;
        }
        .theme-toggle:hover { background: var(--gold-primary); color: var(--bg-color); }

        @media (max-width: 480px) {
            .home-title { font-size: 0.7rem; letter-spacing: 1px; }
            .nav-header { padding: 10px 15px; }
        }

        /* ==========================================
           3. 載入與預熱機制
           ========================================== */
        #loading-screen {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 9000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .loading-title {
            font-size: 1rem; letter-spacing: 3px; font-weight: 300;
            color: var(--gold-primary); margin-bottom: 40px; padding: 0 10px;
            animation: auraBreathing 3s infinite ease-in-out;
        }
        @keyframes auraBreathing {
            0%, 100% { text-shadow: 0 0 10px rgba(182, 154, 104, 0); transform: scale(1); }
            50% { text-shadow: 0 0 25px rgba(182, 154, 104, 0.4); transform: scale(1.02); }
        }
        .progress-track { width: 150px; height: 1px; background: var(--gold-light); position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--gold-primary); transition: width 0.3s ease; }

        /* ==========================================
           4. 主頁 UI 佈局
           ========================================== */
        #main-page {
            width: 100%; max-width: 600px; max-height: calc(100dvh - 70px); position: absolute; top: calc(40px + (100dvh - 50px) / 2 );left: 50%; transform: translate(-50%, -50%); padding: 0 10%;
            display: flex; flex-direction: column; justify-content: center; touch-action: pan-y;
            opacity: 0; visibility: hidden; transition: opacity 1.2s ease;
            margin: 0 auto; overflow-y: auto; box-sizing: border-box;
        }
	/* 針對互動元素防止「雙擊放大」 */
	button, input, textarea, .cat-btn, .mode-btn {
    touch-action: manipulation; 
}

        .input-group { margin-bottom: 25px; }
        .label { font-size: 0.7rem; color: var(--gold-primary); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
        
        textarea {
            width: 100%; padding: 10px 0; border: none; border-bottom: var(--border-thin); font-size: 16px;
            background: var(--input-bg); color: var(--text-color); font-size: 0.85rem;
            resize: none; outline: none; max-height: 100px; transition: 0.4s;
            -webkit-user-select: auto; user-select: auto;
        }
        textarea:focus { border-bottom-color: var(--gold-primary); }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .btn-outline {
            padding: 12px 0; background: transparent; border: var(--border-thin);
            color: var(--text-color); font-size: 0.8rem; cursor: pointer;
            opacity: 0.7;
/* 關鍵修復：清除手機瀏覽器原生的按鈕外觀與預設圓角 */
    -webkit-appearance: none;
    appearance: none;
    border-radius: 0;
        }

@media (hover: hover) {
    .btn-outline:hover { 
        opacity: 1; 
        border-color: var(--gold-primary); 
    }
}

        .btn-outline.active {
            border-color: var(--gold-primary) !important; color: var(--gold-primary) !important;
            background: rgba(182, 154, 104, 0.05)!important; opacity: 1 !important; font-weight: 500;
        }

        #relation-container {
            display: none; align-items: center; justify-content: space-between;
            padding: 1px 0; border-bottom: var(--border-thin); font-size: 0.85rem;
            animation: fadeIn 0.5s ease;
        }

        /* 統一按鈕基礎設定 */
        .btn-solid {
            width: 100%; padding: 18px; background: var(--gold-primary);
            color: var(--bg-color); border: none; font-size: 0.9rem;
            letter-spacing: 5px; text-transform: uppercase; cursor: pointer;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        
        /* 點擊效果 */
        .btn-solid:active {
            transform: scale(0.98);
        }

        /* 主按鈕 Hover */
        .btn-solid:hover { background: var(--text-color); color: var(--bg-color); }

        /* 特製 Save 按鈕 */
        .btn-save {
            flex: 1;
            background: var(--gold-primary);
            border: 1px solid var(--gold-primary);
            color: var(--bg-color);
            display: flex; align-items: center; justify-content: center; padding: 12px 0;
        }
        .btn-save:hover {
            background: var(--text-color); 
            border-color: var(--text-color);
        }

        /* 特製 Return 按鈕 */
        .btn-return {
            flex: 1;
            background: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            display: flex; align-items: center; justify-content: center; padding: 12px 0;
        }
        .btn-return:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* ==========================================
           5. 扇形展牌與洗牌系統
           ========================================== */
        #spread-view {
            display: none; width: 100vw; height: 100dvh; position: relative;
            opacity: 0; transition: opacity 1s ease; overflow: hidden;
        }
/* 容器需要透視點才有 3D 效果 */
#cards-container { 
    position: absolute; 
    inset: 0; 
    perspective: 1000px; /* 增加空間感 */
}

@keyframes luxuryShuffle {
    0% { 
        transform: translate(-50%, -50%) translateZ(0) rotate(0deg) rotateY(0deg); 
        z-index: 10; 
    }
    20% { 
        /* 向左外拋，帶點傾斜 */
        transform: translate(-65%, -52%) translateZ(30px) rotate(-12deg) rotateY(15deg); 
        z-index: 20; 
    }
    40% { 
        /* 回收至中心下方 */
        transform: translate(-45%, -48%) translateZ(-20px) rotate(5deg) rotateY(-10deg); 
        z-index: 5; 
    }
    60% { 
        /* 向右外拋，產生層次落差 */
        transform: translate(-35%, -55%) translateZ(50px) rotate(10deg) rotateY(20deg); 
        z-index: 25; 
    }
    80% { 
        /* 輕微晃動歸位 */
        transform: translate(-55%, -45%) translateZ(10px) rotate(-3deg) rotateY(-5deg); 
        z-index: 15; 
    }
    100% { 
        transform: translate(-50%, -50%) translateZ(0) rotate(0deg) rotateY(0deg); 
        z-index: 10; 
    }
}

.shuffling {
    /* 使用 cubic-bezier 讓動作有「先快後慢」的物理慣性高級感 */
    animation: luxuryShuffle 1.2s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
}

        .card-wrap {
            position: absolute; width: 75px; height: 120px;
            cursor: pointer; z-index: 10;will-change: transform, opacity;transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease;
        }
        @media (min-width: 768px) { .card-wrap { width: 120px; height: 180px; } }

        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; pointer-events: none; will-change: transform;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
        .card-face {
            position: absolute; inset: 0; backface-visibility: hidden; width: 100%;
            height: 100%;
            object-fit: cover; 
            border-radius: 8px; background-position: center;
            border: var(--border-thin); box-shadow: 0 5px 15px var(--card-shadow); background-clip: padding-box;
        }
        .card-back { background-color: var(--gold-light); background-image: linear-gradient(135deg, var(--gold-primary) 25.5%, transparent 26%); background-repeat: no-of-repeat;overflow: hidden; }
        .card-front { transform: rotateY(180deg); background-color: #c7a243;overflow: hidden;-webkit-mask-image: -webkit-radial-gradient(white, black); }

/* 專門針對正面圖片的放大處理 */
.card-front img {
    width: 100%;
    height: 100%;
    object-fit: cover;object-position: 52% 50%;
    /* 核心修改：透過 scale 放大圖片約 5%，這會直接裁切掉原本素材周圍的空白 */
    transform: scale(1.05); 
    transition: transform 0.3s ease;
}

        .card-wrap.popped { z-index: 100 !important; }
        .card-wrap.popped .card-inner {
            transform: translate(var(--pop-x, 0), var(--pop-y, -50px)) scale(1.15);
            box-shadow: 0 15px 30px var(--card-shadow-hover);border-radius: 8px; 
        }
        
        .card-wrap.confirmed { pointer-events: auto !important; cursor: pointer; z-index: 2100 !important; }

        #confirm-btn-float {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%) translateY(20px);
            display: none; pointer-events: none; 
            z-index: 200; padding: 12px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            opacity: 0; transition: all 0.4s ease;
        }

        #draw-counter {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            font-size: 1.5rem; color: var(--gold-primary); letter-spacing: 5px;
            z-index: 50; display: none; font-weight: 300;
            animation: fadeIn 1s ease forwards;
        }

        #retry-btn {
            position: fixed; bottom: 30px; right: 20px; z-index: 8600;
            display: none; background: var(--panel-bg); backdrop-filter: blur(5px);
            padding: 10px 15px; border-radius: 5px; width: auto; font-size: 0.7rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
        }

/* =========================================
   方案四 進階修正：虹光弧影 (Rainbow Radial Fade)
   ========================================= */

.liquid-cocoon-svg {
    position: absolute;
    /* 完全貼合卡牌邊緣 */
    inset: 0; 
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
    /* 配合 3D 翻轉，微幅浮起避免與卡面重合產生的閃爍 */
    transform: rotateY(180deg) translateZ(1px);
    backface-visibility: hidden;
    overflow: visible;
}

/* =========================================
   修正版：對角線長征與括號滲透呼吸
   ========================================= */

/* 基礎設定 */
.glass-flow, .glass-stasis {
    fill: none;
    stroke: url(#rainbowGrad);
    stroke-linecap: round; /* 確保頭尾都是圓潤的 */
}

/* --- 動態光束：分層漸變拖尾 (維持你的設定) --- */
.glass-flow.tail { stroke-width: 2px; stroke-dasharray: 35 100; opacity: 0.25; }
.glass-flow.mid  { stroke-width: 2px;   stroke-dasharray: 15 100; opacity: 0.6; }
.glass-flow.head { stroke-width: 2.5px;   stroke-dasharray: 2 100;  opacity: 1; filter: drop-shadow(0 0 4px white); }

.run-cocoon .glass-flow.tail { animation: runTail 4s cubic-bezier(0.3, 0.1, 0.3, 1) infinite; }
.run-cocoon .glass-flow.mid  { animation: runMid 4s cubic-bezier(0.3, 0.1, 0.3, 1) infinite; }
.run-cocoon .glass-flow.head { animation: runHead 4s cubic-bezier(0.3, 0.1, 0.3, 1) infinite; }

/* 你的魔法計算 */
@keyframes runTail {
    0%  { stroke-dashoffset: 35; stroke-dasharray: 35 100; opacity: 0; }
    2%  { stroke-dashoffset: 20; stroke-dasharray: 20 100; opacity: 1; }
    25% { 
        stroke-dashoffset: -80; 
        stroke-dasharray: 15 100;
        opacity: 0.8; 
    }
    27% {
        stroke-dasharray: 5 100; 
        stroke-dashoffset: -100;
        opacity: 0.4;
    }
    29% {
        stroke-dasharray: 0 100; 
        stroke-dashoffset: -105;
        opacity: 0.2;
    }
    30%, 100% { stroke-dashoffset: -105; opacity: 0; }
}

@keyframes runMid {
    0%  { stroke-dashoffset: 15; stroke-dasharray: 15 100; opacity: 0; }
    2%  { stroke-dashoffset: 5;  stroke-dasharray: 15 100; opacity: 1; }
    25% { 
        stroke-dashoffset: -95; 
        stroke-dasharray: 10 100;
        opacity: 0.9; 
    }
    26% {
        stroke-dasharray: 0 100; 
        stroke-dashoffset: -110;
        opacity: 0.6;
    }
    29% {
        stroke-dasharray: 0 100; 
        stroke-dashoffset: -120;
        opacity: 0.2;
    }
    30%, 100% { stroke-dashoffset: -125; opacity: 0; }
}

@keyframes runHead {
    0%  { stroke-dashoffset: 2; opacity: 0; }
    2%  { stroke-dashoffset: -8; opacity: 1; }
    25% { stroke-dashoffset: -98; opacity: 0.4; }
    30%, 100% { stroke-dashoffset: -138; opacity: 0; }
}

/* --- 全邊框發光：光束抵達後點燃整條路徑 --- */
.glass-stasis {
    stroke-width: 2.5px;
    /* 移除了遮罩設定 */
    opacity: 0;
}

.run-cocoon .glass-stasis {
    /* 沿用你的時間設定，確保無縫銜接 */
    animation: fullPathBreathe 4s ease-in-out infinite;
}

@keyframes fullPathBreathe {
    /* 光束還在趕路，整條邊框保持隱藏 */
    0%, 23% { opacity: 0; filter: brightness(1); }
    
    /* 26%~30%: 光束一頭撞進角落，整條邊框瞬間點亮！ */
    24% { opacity: 0.5; filter: drop-shadow(0 0 2px white); }
    30% { opacity: 1; filter: brightness(1.8) drop-shadow(0 0 8px white); }
    
    /* 45%~65%: 緩慢的全線發光 ease out */
    45% { opacity: 0.7; filter: brightness(1.3) drop-shadow(0 0 4px rgba(255,255,255,0.6)); }
    65% { opacity: 0.95; filter: brightness(1.6) drop-shadow(0 0 6px white); }
    
    /* 85%~100%: 能量徹底消散，準備迎接下一輪光束衝刺 */
    85%, 100% { opacity: 0; filter: brightness(1); }
}
        /* ==========================================
           6. 隱藏式下拉解說面板與報告佈局
           ========================================== */
        #result-panel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75dvh;
            background: var(--panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: var(--border-thin); box-shadow: var(--glass-shadow);
            padding: 5dvh 10%; overflow-y: auto; z-index: 8500;
            transform: translateY(100%); transition: transform 0.9s cubic-bezier(0.2, 1, 0.3, 1);
        }
        #result-panel.active { transform: translateY(0); }

        .report-layout-triple {
            display: flex; gap: 20px; width: 100%; justify-content: space-between;
        }
        .report-layout-triple .result-block { flex: 1; border-left: none; border-top: 2px solid var(--gold-primary); padding-left: 0; padding-top: 15px; }

        @media (max-width: 768px) {
            .report-layout-triple {
                overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 20px;
            }
            .report-layout-triple .result-block {
                flex: 0 0 85%; scroll-snap-align: center;
            }
        }

        .result-block { margin-bottom: 40px; border-left: 2px solid var(--gold-primary); padding-left: 20px; }
        .res-position { font-size: 0.65rem; color: var(--gold-primary); letter-spacing: 2px; margin-bottom: 8px; }
        .res-title { font-size: 1.2rem; margin-bottom: 12px; font-weight: 500; }
        .res-text { font-size: 0.95rem; line-height: 1.8; opacity: 0.85; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
<div class="nav-header">

    <div class="watermark">Grafittiii</div>
    <div class="home-title">孫孫暉日塔羅 Mascot Tarot</div>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☽</button>
</div>
    <div id="loading-screen">
        <div class="loading-title">孫孫塔羅 Mascot Tarot</div>
        <div class="progress-track"><div id="progress-bar"></div></div>
    </div>

    <div id="main-page">
        <div>
            <div class="input-group">
                <div class="label">Your Query</div>
                <textarea id="q-input" rows="1" placeholder="寫下你的困惑 (選填)..."></textarea>
            </div>
            
            <div class="input-group">
                <div class="label">Category</div>
                <div class="grid-3">
                    <button class="btn-outline cat-btn" onclick="setCat(this, '學業')">學業</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '事業')">事業</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '愛情')">愛情</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '親友')">親友</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '健康')">健康</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '心靈')">心靈</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '旅程')">旅程</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '決策')">決策</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '其他')">其他</button>
                </div>
            </div>

            <div id="relation-container">
                <span>是查問你與他/她的關係嗎？（使用關係解牌）</span>

function prebuildDeckDOM() {
    const container = document.getElementById('cards-container');
    if (container.children.length > 0) return; // 避免重複建立

    // 建立 78 張牌的基礎結構
    for (let i = 0; i < 78; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrap';
        wrapper.style.display = 'none'; // 初始隱藏
        
        // 這裡完全保留你提供的 HTML 結構，包含 img 的樣式
        wrapper.innerHTML = `

</div>

<div class="card-inner">

        <img src="tarot cards/photo-output.png" style="width:100%; height:100%; object-fit:cover;" onerror="this.style.opacity='0';" draggable="false">
    </div>
    <div class="card-face card-front">
        <img src="" style="width:100%; height:100%; object-fit:cover; transform:scale(1.05);" draggable="false">
    </div>
</div>
        `;
        wrapper.onclick = (e) => handleCardClick(e, wrapper);
        container.appendChild(wrapper);
    }
}

function startPreloading() {
    document.fonts.ready.then(() => {
        // 先建立好 DOM 殼
        prebuildDeckDOM(); 

        imageUrls.forEach(url => {
            const img = new Image();
            img.src = url; 
            img.onload = () => {
                // 新增：強制 Chrome 在背景解碼圖片，避免洗牌時卡頓
                if (img.decode) {
                    img.decode().then(() => updateProgress()).catch(() => updateProgress());
                } else {
                    updateProgress();
                }
            };
            img.onerror = () => updateProgress();
        });
    });
}

function updateProgress() {
    loadedCount++;
    const progressPercent = (loadedCount / totalImages) * 100;
    
    // 更新進度條 UI
    if (progressBar) {
        progressBar.style.width = `${progressPercent}%`;
    }

    // 達到 80% 門檻就進入主頁面
    if (loadedCount >= totalImages * threshold) {
        // 防止多次觸發
        if (loadingScreen.dataset.loadingComplete) return;
        loadingScreen.dataset.loadingComplete = "true";
        
        setTimeout(enterMainPage, 500); 
    }
}

    if (loadingScreen.style.opacity === '0') return;

    setTimeout(() => {
        loadingScreen.style.display = 'none';
        
        mainPage.style.visibility = 'visible';
        mainPage.style.opacity = '1';
        
        // 加上你第二段程式碼中的這行，確保標題動畫正常顯示
        document.body.classList.add('show-home-title');
    }, 1000); // 1秒淡出時間
}

        function handleCardClick(e, wrapper) {
            e.stopPropagation();
            if (wrapper.classList.contains('confirmed') || wrapper.classList.contains('shuffling')) return;

function finalizeSelection() {
            // 1. 優先獲取核心數值，確保後續 transform 計算準確
            const totalCards = drawnCards.length;
            const isMobile = window.innerWidth < 768;
            
            const counter = document.getElementById('draw-counter');

            document.querySelectorAll('.card-wrap:not(.confirmed)').forEach(el => {
                el.style.transition = 'opacity 0.5s ease-out, bottom 0.4s ease-in, left 0.4s ease-in'; 
                el.style.opacity = '0';

                if (isMobile) {
                    el.style.left = '-50%'; 
                } else {
                    el.style.bottom = '-50%'; 
                }
            });

            // 3. 【優化時間軸】 100ms：移至中央並提前注入 SVG
            setTimeout(() => {
                drawnCards.forEach((drawn, i) => {
                    const el = drawn.elementDOM;
                    
                    // 【關鍵優化】：在卡牌準備集中前，就先悄悄把 SVG 塞進去。
                    // 此時沒有 .run-cocoon class，SVG 處於隱藏/靜止狀態，不會消耗效能
                    const inner = el.querySelector('.card-inner'); 
                    if (!inner.querySelector('.liquid-cocoon-svg')) {
                        inner.insertAdjacentHTML('beforeend', liquidCocoonSVG);
                    }

                    el.classList.remove('confirmed');
                    el.style.opacity = '1';
                    
                    // 【關鍵優化】：絕對不要用 transition: all！指定屬性可以避免手機渲染引擎卡頓
                    el.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), left 0.6s cubic-bezier(0.25, 1, 0.5, 1), top 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
                    
                    const centerOffsetX = (totalCards === 1) ? 0 : (i - (totalCards - 1) / 2) * (isMobile ? 110 : 160); 
                    
                    el.style.transformOrigin = "center center";
                    el.style.left = `calc(50% + ${centerOffsetX}px)`;
                    el.style.top = `50%`;
                    el.style.bottom = 'auto';
                    el.style.transform = `translate(-50%, -50%) rotate(0deg) scale(${totalCards === 1 ? 1.1 : 1})`; 
                });

                    const rotation = drawn.isReversed ? 'rotateY(180deg) rotateZ(180deg)' : 'rotateY(180deg)';
                    
                    inner.style.transition = 'transform 0.8s cubic-bezier(0.4, 0, 0.2, 1)';

                            <div class="res-title">${card.name} ${card.isReversed ? '(逆位)' : '(正位)'}</div>
                            <div class="res-position" style="color:var(--text-color); opacity:0.6;">Keywords: ${kwStr}</div>
                            <div class="res-text">${meaningText}</div>
                        </div>
                    `;
                });

                content.innerHTML = isTriple ? `<div class="report-layout-triple">${html}</div>` : html;
                panel.classList.add('active');
                document.getElementById('advice-section').style.display = 'block';

                document.getElementById('retry-btn').style.display = 'none';

            } catch (error) {
                console.error("生成報告時發生錯誤：", error);
if (document.getElementById('retry-btn')) document.getElementById('retry-btn').style.display = 'block';
            }
        }

        function drawAdvice() {
            document.getElementById('advice-section').style.display = 'none'; 
            
            const usedIds = drawnCards.map(c => c.id);
            const remaining = tarotData.filter(c => !usedIds.includes(c.id));
            if (remaining.length === 0) return;

            const advCard = remaining[Math.floor(Math.random() * remaining.length)];
            const isReversed = Math.random() > 0.5;

            const html = `
                <div class="result-block" style="border-color: var(--text-color); padding-left: 15px;">
                    <div class="res-position" style="color: var(--text-color);">追加建議</div>
                    <div class="res-title">${advCard.name} ${isReversed ? '(逆位)' : '(正位)'}</div>
                    <div class="res-text"><strong>箴言：</strong>${stateData.advice || '跟隨內心的指引。'}</div>
                </div>
            `;
            
            const target = document.getElementById('advice-content');
            if(target) {
                target.innerHTML = html;
                target.style.opacity = '0';
                target.style.animation = 'fadeIn 1s ease forwards';
            }
        }

        function restartApp() {
            document.getElementById('result-panel').classList.remove('active');
            document.getElementById('spread-view').style.opacity = '0';
            document.getElementById('retry-btn').style.display = 'none';
            
            // 安全檢查：若有 ID 才操作
            const saveBtn = document.getElementById('save-btn');
            if (saveBtn) saveBtn.style.display = 'flex'; // 恢復原本的 flex 屬性

            confirmBtn.style.display = 'none';
            confirmBtn.style.pointerEvents = 'none'; 
            
            setTimeout(() => {
                document.getElementById('spread-view').style.display = 'none';
                document.getElementById('cards-container').innerHTML = '';
                if(document.getElementById('advice-content')) document.getElementById('advice-content').innerHTML = '';
                document.getElementById('advice-section').style.display = 'none';
                
                const main = document.getElementById('main-page');
                main.style.display = 'flex';
                main.style.opacity = '0';
requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                // 這裡加入類別，才會真正觸發 CSS 的 1.5s transition
                document.body.classList.add('show-home-title');
                main.style.opacity = '1';
            });
        });
            }, 900);

// 輔助函式維持不變
function drawQRCodeToCanvas(ctx, x, y, dark, light) {
    // 必須 return 一個 Promise
    return new Promise((resolve, reject) => { 
        const qrDiv = document.createElement('div');
        new QRCode(qrDiv, {
            text: "https://grafittiii-hub.github.io/MascotTarot/",
            width: 80,
            height: 80,
            colorDark: dark,
            colorLight: light
        });

        const checkQR = setInterval(() => {
            const qrImg = qrDiv.querySelector('img');
            if (qrImg && qrImg.src) {
                clearInterval(checkQR);
                ctx.drawImage(qrImg, x, y, 80, 80);
                
                // 現在 resolve 已經在 Promise 參數中定義了
                resolve(); 
            }
        }, 50);

        // 可選：加上超時保護，避免死循環
        setTimeout(() => {
            clearInterval(checkQR);
            resolve(); // 即使失敗也 resolve，避免 exportImage 卡死
        }, 3000);
    });
}

async function exportImage() {
    await document.fonts.load("1em 'Noto Serif TC'");
    const saveBtn = document.getElementById('save-btn');
    if (!saveBtn) return; 
    
    const originalText = saveBtn.innerText;
    saveBtn.innerText = "SAVING...";
    
    try {
        // 1. 取得顏色系統
        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim();
        const goldColor = getComputedStyle(document.documentElement).getPropertyValue('--gold-primary').trim();
        const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim();

        // 2. 擷取文字內容
        const qText = document.getElementById('report-question').innerText;
        const blocks = document.querySelectorAll('#result-panel .result-block');
        const parsedBlocks = Array.from(blocks).map(block => {
            const allPosEls = block.querySelectorAll('.res-position');
            const pos = allPosEls[0] ? allPosEls[0].innerText : '';
            const kws = allPosEls.length > 1 ? allPosEls[1].innerText : '';
            const title = block.querySelector('.res-title') ? block.querySelector('.res-title').innerText : '';
            const text = block.querySelector('.res-text') ? block.querySelector('.res-text').innerText : '';
            return { pos, title, kws, text };
        });

        // 3. 畫布參數設定
        const finalWidth = 1080;
        const contentWidth = 920; 
        const marginX = (finalWidth - contentWidth) / 2;
        const cardW = 120;  // 稍微加大卡牌尺寸更有氣勢
        const cardH = 192;  
        const cardGap = 40;
        const headerSpace = 200; 

        // 4. 動態高度計算引擎
        const tempCanvas = document.createElement('canvas');
        const dCtx = tempCanvas.getContext('2d');
        
        function measureWrappedText(ctx, text, maxWidth, lineHeight) {
            if (!text) return 0;
            const paragraphs = text.split('\n');
            let totalHeight = 0;
            for (let p of paragraphs) {
                let currentLine = '';
                for (let char of p) {
                    const testLine = currentLine + char;
                    if (ctx.measureText(testLine).width > maxWidth && currentLine !== '') {
                        totalHeight += lineHeight;
                        currentLine = char;
                    } else {
                        currentLine = testLine;
                    }
                }
                totalHeight += lineHeight;
            }
            return totalHeight;
        }

        let totalContentHeight = headerSpace + (drawnCards.length > 0 ? cardH + 100 : 0);
        dCtx.font = "26px 'Georgia', 'Noto Serif TC', serif";
        totalContentHeight += measureWrappedText(dCtx, qText, contentWidth, 40) + 60;

        parsedBlocks.forEach(b => {
            totalContentHeight += 40; // padding
            if (b.pos) totalContentHeight += 35;
            if (b.title) totalContentHeight += 60;
            if (b.kws) totalContentHeight += 35;
            if (b.text) {
                dCtx.font = "28px serif";
                totalContentHeight += measureWrappedText(dCtx, b.text, contentWidth - 40, 48);
            }
            totalContentHeight += 60; 
        });

        const finalHeight = totalContentHeight + 200;

        // 5. 正式開始繪製
        const canvas = document.createElement('canvas');
        canvas.width = finalWidth;
        canvas.height = finalHeight;
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = "top";
        
        // 背景
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 標題
        ctx.fillStyle = goldColor;
        ctx.font = "bold 40px 'Georgia', 'Noto Serif TC', serif";
        ctx.textAlign = "center"; ctx.letterSpacing = "3px";
        ctx.fillText("孫孫暉日塔羅 MASCOT TAROT", canvas.width / 2, 80);

        // 繪製卡牌 (包含正逆位邏輯)
        if (drawnCards && drawnCards.length > 0) {
            const totalCardsWidth = (drawnCards.length * cardW) + ((drawnCards.length - 1) * cardGap);
            const startX = (canvas.width - totalCardsWidth) / 2;

            drawnCards.forEach((card, i) => {
                const imgEl = card.elementDOM.querySelector('.card-front img');
                if (imgEl) {
                    ctx.save();
                    const centerX = startX + i * (cardW + cardGap) + cardW / 2;
                    const centerY = headerSpace + cardH / 2;
                    ctx.translate(centerX, centerY);

                    if (card.isReversed) ctx.rotate(Math.PI);

                    // 模擬 Object-fit: cover 與 Scale(1.05)
                    const sScale = 1.05;
                    const imgW = imgEl.naturalWidth;
                    const imgH = imgEl.naturalHeight;
                    const targetAspect = cardW / cardH;
                    let sW, sH, sx, sy;

                    if ((imgW / imgH) > targetAspect) {
                        sH = imgH / sScale;
                        sW = sH * targetAspect;
                    } else {
                        sW = imgW / sScale;
                        sH = sW / targetAspect;
                    }
                    sx = (imgW - sW) * 0.52; // 依照你 CSS 的 52% 偏移
                    sy = (imgH - sH) * 0.50;

                    ctx.drawImage(imgEl, sx, sy, sW, sH, -cardW/2, -cardH/2, cardW, cardH);
                    ctx.restore();
                }
            });
        }

        // 6. 繪製報告文字
        let drawY = headerSpace + (drawnCards.length > 0 ? cardH + 80 : 0);
        ctx.textAlign = "left"; 
        
        // 問題內容
        ctx.fillStyle = textColor;
        ctx.globalAlpha = 0.5;
        ctx.font = "26px 'Georgia', 'Noto Serif TC', serif";
        function drawText(txt, x, y, maxWidth, lineHeight) {
            ctx.font = "20px 'Georgia', 'Noto Serif TC', serif";
            const paragraphs = txt.split('\n');
            let currentY = y;
            for (let p of paragraphs) {
                let line = '';
                for (let char of p) {
                    const test = line + char;
                    if (ctx.measureText(test).width > maxWidth) {
                        ctx.fillText(line, x, currentY);
                        currentY += lineHeight;
                        line = char;
                    } else {
                        line = test;
                    }
                }
                ctx.fillText(line, x, currentY);
                currentY += lineHeight;
            }
            return currentY - y;
        }

        drawY += drawText(qText, marginX, drawY, contentWidth, 40) + 40;
        ctx.globalAlpha = 1.0;

        // 解牌區塊
        parsedBlocks.forEach(b => {
            const blockStartY = drawY;
            drawY += 20;
            const textX = marginX + 30;

            if (b.pos) {
                ctx.fillStyle = goldColor;
                ctx.font = "22px 'Georgia', 'Noto Serif TC', serif";ctx.letterSpacing = "3px";
                ctx.fillText(b.pos, textX, drawY);
                drawY += 50;
            }
            if (b.title) {
                ctx.fillStyle = textColor;
                ctx.font = "36px 'Georgia', 'Noto Serif TC', serif";ctx.letterSpacing = "3px";
                ctx.fillText(b.title, textX, drawY);
                drawY += 60;
            }
            if (b.kws) {
                ctx.fillStyle = textColor;
                ctx.globalAlpha = 0.6;
                ctx.font = "22px 'Georgia', 'Noto Serif TC', serif";
                ctx.letterSpacing = "3px";
                ctx.fillText(b.kws, textX, drawY);
                drawY += 40;
                ctx.globalAlpha = 1.0;
            }
            if (b.text) {
                ctx.fillStyle = textColor;
                ctx.font = "28px 'Georgia', 'Noto Serif TC', serif";ctx.letterSpacing = "2px";
                drawY += drawText(b.text, textX, drawY, contentWidth - 40, 48);
            }

            // 金色左裝飾線
            ctx.fillStyle = goldColor;
            ctx.fillRect(marginX, blockStartY + 20, 4, drawY - blockStartY - 10);
            drawY += 50;
        });

// 7. Footer 與 QR Code
        ctx.textAlign = "center";
        ctx.fillStyle = textColor;
        ctx.globalAlpha = 0.5;
        ctx.font = "14px 'Georgia', 'Noto Serif TC', serif"; 
        ctx.letterSpacing = "2px";
        ctx.fillText("Copyright© 2026 Grafittiii | Mascot Tarot", canvas.width / 2, finalHeight - 50);
        
        // 呼叫 QR Code 繪製並等待完成
        await drawQRCodeToCanvas(ctx, canvas.width - 150, finalHeight - 150, goldColor, bgColor);

        // 獲取並格式化西曆時間 (YYYYMMDDHHmm)
        const now = new Date();
        const timeStr = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}`;

        // 下載圖片
        setTimeout(() => {
            const link = document.createElement('a');
            const categoryName = typeof currentCategory !== 'undefined' ? currentCategory : 'Tarot';
            link.download = `MascotTarot_${categoryName}_${timeStr}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            saveBtn.innerText = originalText;
        }, 600);

    } catch (err) {
        console.error("下載失敗:", err);
        saveBtn.innerText = "ERROR";
    }
}

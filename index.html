<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孫孫暉日 Tarot</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #fffaf5;
            --accent-main: #d4a373;
            --text-dark: #5c4033;
            --card-w: 80px;
            --card-h: 135px;
        }

        /* 安全防護：全站禁止選擇 */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-touch-callout: none; -webkit-user-select: none;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background: var(--bg-color);
            color: var(--text-dark);
            height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed; inset: 0; background: var(--bg-color);
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s;
        }
        .progress-bar { width: 180px; height: 3px; background: #eee; margin-top: 20px; border-radius: 5px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #ffcc00; transition: width 0.3s; }

        /* Home Page */
        #main-page {
            width: 92%; max-width: 420px; text-align: center;
            display: none; opacity: 0; transition: 1s;
        }
        h1 { font-size: 1.8rem; letter-spacing: 0.3em; margin-bottom: 25px; color: var(--accent-main); }
        .section-label { font-size: 0.8rem; color: #a67c52; text-align: left; margin: 15px 0 5px 10px; font-weight: bold; }
        
        textarea {
            width: 100%; padding: 12px; border: 1px solid #e8e0d0; border-radius: 18px;
            background: rgba(255,255,255,0.6); font-family: inherit; resize: none; outline: none;
        }

        .option-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn {
            flex: 1; padding: 10px; border: 1px solid #e0d5c1; border-radius: 12px;
            background: #fff; cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }
        .mode-btn.active { background: var(--accent-main); color: #fff; border-color: var(--accent-main); }

        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .cat-btn {
            padding: 10px; background: #fff; border: none; border-radius: 10px;
            font-family: inherit; font-size: 0.85rem; cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.03); transition: 0.3s;
        }
        .cat-btn.active { background: var(--accent-main); color: #fff; transform: scale(1.05); }

        #rel-area {
            display: none; background: #fff; padding: 15px; border-radius: 15px;
            margin: 15px 0; align-items: center; justify-content: space-between; font-size: 0.9rem;
        }

        /* Spread View */
        #spread-view { display: none; width: 100vw; height: 100vh; position: relative; }
        .cards-container { position: absolute; left: -100px; top: 0; width: 100%; height: 100%; }

        .card-wrapper {
            position: absolute; left: 0; top: 50%;
            width: var(--card-w); height: var(--card-h);
            transform-origin: center left;
            transition: all 1.2s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer;
        }
        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s; }
        .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 8px; background-size: cover; border: 1px solid rgba(255,255,255,0.5); }
        .card-back { background-image: url('photo-output.jpg'); }
        .card-front { transform: rotateY(180deg); }

        .card-wrapper.selected {
            transform: translate(180px, -50%) scale(1.3) rotate(0deg) !important;
            z-index: 1000 !important;
        }
        .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }
        .card-wrapper.fade-out { opacity: 0; pointer-events: none; }

        #ui-right {
            position: absolute; right: 25px; top: 50%; transform: translateY(-50%);
            display: none; flex-direction: column; align-items: center; gap: 20px;
        }
        .confirm-btn {
            width: 60px; height: 180px; background: var(--accent-main); color: #fff;
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer;
            writing-mode: vertical-rl; letter-spacing: 6px; font-size: 1.1rem;
            box-shadow: 4px 4px 15px rgba(212, 163, 115, 0.3);
        }

        /* Result Panel */
        #result-panel {
            position: fixed; bottom: 0; width: 100%; height: 72%;
            background: #fff; border-radius: 35px 35px 0 0;
            padding: 30px 25px; overflow-y: auto; display: none;
            transform: translateY(100%); transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            z-index: 1500; box-shadow: 0 -10px 40px rgba(0,0,0,0.05);
        }
        #result-panel.active { transform: translateY(0); }

        .stellar-whisper {
            background: #fffaf0; border-radius: 15px; padding: 15px; margin-top: 20px;
            font-style: italic; font-size: 0.85rem; color: #b088a8; border: 1px dashed #d4a373;
        }

        .btn-row { display: flex; gap: 10px; margin-top: 30px; }
        .action-btn {
            flex: 1; padding: 15px; border-radius: 15px; border: 1px solid var(--accent-main);
            background: #fff; font-family: inherit; font-weight: bold; color: var(--accent-main); cursor: pointer;
        }
        .action-btn.primary { background: var(--accent-main); color: #fff; }

        .watermark { position: fixed; bottom: 10px; right: 10px; font-size: 9px; color: rgba(0,0,0,0.05); pointer-events: none; }
    </style>
</head>

                cards.forEach((card, i) => {

                    card.onclick = () => selectCard(card, i);

            }, 100);

            const limit = currentMode === 'single' ? 1 : 3;

                selectedCards = selectedCards.filter(c => c !== el);
            } else if(selectedCards.length < limit) {

                selectedCards.push(el);

        function showInterpret() {
            const panel = document.getElementById('result-panel');
            const content = document.getElementById('result-content');
            const isRelation = document.getElementById('is-relation-check').checked;

            let html = `<h2 style="color:var(--accent-main); margin-bottom:5px;">孫孫暉日：${currentCat}解讀</h2>`;
            html += `<p style="font-size:0.85rem; color:#888; margin-bottom:20px;">問題：${document.getElementById('question-input').value || "當前狀態指引"}</p>`;

            // 三牌陣標籤邏輯
            const labelsTime = ["過去", "現在", "未來"];
            const labelsRel = ["我的看法", "對方的看法", "現況結果"];
            const activeLabels = (currentMode === 'triple' && isRelation) ? labelsRel : labelsTime;

            finalResults.forEach((res, i) => {
                const title = currentMode === 'single' ? "核心指引" : activeLabels[i];
                html += `
                    <div style="margin-bottom:20px;">
                        <strong style="color:var(--accent-main);">${title}：${res.name} ${res.isRev?'(逆位)':'(正位)'}</strong>
                        <p style="margin-top:5px; line-height:1.6; font-size:0.95rem;">${res.msg}</p>
                    </div>
                `;
            });

            if(Math.random() < 0.4) {
                html += `<div class="stellar-whisper"><strong>額外啟示：</strong> 牌面顯示你當前的能量有些停滯，建議在抽牌後的 24 小時內多留意水邊的訊息。</div>`;
            }

            content.innerHTML = html;
            panel.style.display = 'block';
            setTimeout(() => panel.classList.add('active'), 100);
        }

        // --- 追問建議 ---
        function drawFollowup() {
            if(remainingCards.length === 0) return;
            document.getElementById('ask-btn').style.opacity = '0.5';
            document.getElementById('ask-btn').disabled = true;

            const card = remainingCards[Math.floor(Math.random()*remainingCards.length)];
            const area = document.getElementById('followup-area');
            area.style.display = 'block';
            area.innerHTML = `
                <h4 style="margin-bottom:12px;">追問建議 (由剩下的 ${remainingCards.length} 張中抽出)</h4>
                <div style="display:flex; gap:15px; align-items:flex-start;">
                    <div style="width:55px; height:90px; background-image:url('${card.img}'); background-size:cover; border-radius:5px; border:1px solid #eee; flex-shrink:0;"></div>
                    <div style="font-size:0.9rem; line-height:1.5;">
                        <strong>${card.name}</strong><br>針對你的現況，宇宙的額外建議是：${card.msg}
                    </div>
                </div>
            `;
            finalResults.push({ ...card, isRev: false, isFollowup: true });
        }

        // --- 下載圖片 (Canvas) ---
        function downloadResult() {
            const canvas = document.getElementById('canvas-export');
            const ctx = canvas.getContext('2d');
            canvas.width = 600; canvas.height = 1000;
            
            ctx.fillStyle = "#fffaf5"; ctx.fillRect(0,0,600,1000);
            ctx.fillStyle = "#d4a373"; ctx.font = "bold 32px 'Noto Serif TC'"; ctx.fillText("孫孫暉日 Tarot 解讀", 50, 80);
            
            ctx.fillStyle = "#5c4033"; ctx.font = "18px 'Noto Serif TC'";
            ctx.fillText(`範疇：${currentCat} | 模式：${currentMode === 'single'?'單牌':'三牌陣'}`, 50, 130);
            
            // 繪製微型水印
            ctx.globalAlpha = 0.08;
            for(let i=0; i<8; i++) ctx.fillText("SUNSUN TAROT PROTECTED", 150, i*150);
            ctx.globalAlpha = 1;

            alert("圖片生成中... 請在彈出的視窗長按保存。");
            const win = window.open();
            win.document.write(`<img src="${canvas.toDataURL()}" style="width:100%"/>`);
        }
    </script>
</body>
</html>

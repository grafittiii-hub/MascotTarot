<!DOCTYPE html>
<html lang="zh-Hant" data-theme="day">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孫孫塔羅 Mascot Tarot</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ==========================================
           1. LVMH 高階視覺美學與色彩系統
           ========================================== */
        :root {
            --bg-color: #F8F7F4;
            --text-color: #2C2A28;
            --gold-primary: #e0c53f;
            --gold-light: #ebe7c0;
            --panel-bg: rgba(248, 247, 244, 0.95);
            --border-thin: 1px solid rgba(182, 154, 104, 0.3);
            --glass-shadow: 0 -10px 40px rgba(0,0,0,0.03);
            --input-bg: rgba(0,0,0,0.02);
        }

        [data-theme="night"] {
            --bg-color: #121212;
            --text-color: #EAE6DF;
            --gold-primary: #e0c53f;
            --gold-light: #a89939;
            --panel-bg: rgba(22, 22, 22, 0.95);
            --border-thin: 1px solid rgba(212, 175, 55, 0.3);
            --glass-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            --input-bg: rgba(255,255,255,0.03);
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
            pointer-events: none; z-index: -1;
        }

        /* ==========================================
           2. 全域安全防護
           ========================================== */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Georgia', 'Noto Serif TC', serif;
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            height: 100vh; width: 100vw; overflow: hidden;
            transition: background-color 0.8s ease, color 0.8s ease;
        }

        img, .card-face { pointer-events: none; -webkit-user-drag: none; }
        ::-webkit-scrollbar { display: none; }

        .watermark {
            position: fixed; top: 15px; left: 20px; font-size: 0.5rem;
            color: var(--gold-primary); opacity: 0.5; letter-spacing: 2px;
            pointer-events: none; z-index: 9999; font-style: italic;
        }

        .theme-toggle {
            position: fixed; top: 15px; right: 20px; background: transparent;
            border: var(--border-thin); color: var(--gold-primary);
            padding: 6px 12px; font-size: 0.65rem; letter-spacing: 2px;
            cursor: pointer; z-index: 9999; text-transform: uppercase;
            transition: 0.4s ease;
        }
        .theme-toggle:hover { background: var(--gold-primary); color: var(--bg-color); }

        /* ==========================================
           3. 載入與預熱機制
           ========================================== */
        #loading-screen {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 9000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .loading-title {
            font-size: 1.2rem; letter-spacing: 5px; font-weight: 300;
            color: var(--gold-primary); margin-bottom: 40px;
            animation: auraBreathing 3s infinite ease-in-out;
        }
        @keyframes auraBreathing {
            0%, 100% { text-shadow: 0 0 10px rgba(182, 154, 104, 0); transform: scale(1); }
            50% { text-shadow: 0 0 25px rgba(182, 154, 104, 0.4); transform: scale(1.02); }
        }
        .progress-track { width: 200px; height: 1px; background: var(--gold-light); position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--gold-primary); transition: width 0.3s ease; }

        /* ==========================================
           4. 主頁 UI 佈局
           ========================================== */
        #main-page {
            width: 100%; height: 100%; padding: 80px 10% 40px;
            display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; visibility: hidden; transition: opacity 1.2s ease;
            max-width: 600px; margin: 0 auto;
        }

        .input-group { margin-bottom: 25px; }
        .label { font-size: 0.7rem; color: var(--gold-primary); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
        
        textarea {
            width: 100%; padding: 10px 0; border: none; border-bottom: var(--border-thin);
            background: var(--input-bg); color: var(--text-color); font-size: 0.95rem;
            resize: none; outline: none; transition: 0.4s;
            -webkit-user-select: auto; user-select: auto;
        }
        textarea:focus { border-bottom-color: var(--gold-primary); }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-outline {
            padding: 12px 0; background: transparent; border: var(--border-thin);
            color: var(--text-color); font-size: 0.8rem; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1); opacity: 0.7;
        }
        .btn-outline:hover { opacity: 1; border-color: var(--gold-primary); }
        .btn-outline.active {
            border-color: var(--gold-primary); color: var(--gold-primary);
            background: rgba(182, 154, 104, 0.05); opacity: 1; font-weight: 500;
        }

        #relation-container {
            display: none; align-items: center; justify-content: space-between;
            padding: 15px 0; border-bottom: var(--border-thin); font-size: 0.85rem;
            animation: fadeIn 0.5s ease;
        }

        .btn-solid {
            width: 100%; padding: 18px; background: var(--gold-primary);
            color: var(--bg-color); border: none; font-size: 0.9rem;
            letter-spacing: 5px; text-transform: uppercase; cursor: pointer;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .btn-solid:hover { background: var(--text-color); color: var(--bg-color); }

        /* ==========================================
           5. 扇形展牌與洗牌系統
           ========================================== */
        #spread-view {
            display: none; width: 100vw; height: 100vh; position: relative;
            opacity: 0; transition: opacity 1s ease;
        }
        #cards-container { position: absolute; inset: 0; }

        /* 洗牌動畫 */
        @keyframes shuffleAnim {
            0% { transform: translate(-50%, -50%) rotate(0deg); z-index: 10; }
            25% { transform: translate(-60%, -55%) rotate(-8deg); z-index: 20; }
            50% { transform: translate(-40%, -45%) rotate(8deg); z-index: 10; }
            75% { transform: translate(-55%, -50%) rotate(-4deg); z-index: 20; }
            100% { transform: translate(-50%, -50%) rotate(0deg); z-index: 10; }
        }
        .shuffling {
            animation: shuffleAnim 0.6s infinite alternate ease-in-out;
        }

        .card-wrap {
            position: absolute; width: 70px; height: 115px;
            cursor: pointer; z-index: 10;
        }
        @media (min-width: 768px) { .card-wrap { width: 90px; height: 150px; } }

        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s ease; }
        .card-face {
            position: absolute; inset: 0; backface-visibility: hidden; background-size: cover; background-position: center;
            border: var(--border-thin); box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .card-back { background-color: var(--gold-light); background-image: linear-gradient(135deg, var(--gold-primary) 25%, transparent 25%); }
        .card-front { transform: rotateY(180deg); background-color: #fff; }

        /* 卡牌向外凸出 (而非向圓心) */
        .card-wrap.popped { z-index: 100 !important; }
        .card-wrap.popped .card-inner {
            transform: translate(var(--pop-x, 0), var(--pop-y, -50px)) scale(1.15);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        
        .card-wrap.confirmed { opacity: 0; pointer-events: none; }

        #confirm-btn-float {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%) translateY(20px);
            display: none; z-index: 200; padding: 12px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            opacity: 0; transition: all 0.4s ease;
        }

        /* 抽取進度提示 */
        #draw-counter {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            font-size: 1.5rem; color: var(--gold-primary); letter-spacing: 5px;
            z-index: 50; display: none; font-weight: 300;
            animation: fadeIn 1s ease forwards;
        }

        /* ==========================================
           6. 隱藏式下拉解說面板與報告佈局
           ========================================== */
        #result-panel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75vh;
            background: var(--panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: var(--border-thin); box-shadow: var(--glass-shadow);
            padding: 40px 10%; overflow-y: auto; z-index: 8500;
            transform: translateY(100%); transition: transform 0.9s cubic-bezier(0.2, 1, 0.3, 1);
        }
        #result-panel.active { transform: translateY(0); }

        /* 三牌陣左中右佈局 */
        .report-layout-triple {
            display: flex; gap: 20px; width: 100%; justify-content: space-between;
        }
        .report-layout-triple .result-block { flex: 1; border-left: none; border-top: 2px solid var(--gold-primary); padding-left: 0; padding-top: 15px; }

        /* 手機版報告橫向滑動 */
        @media (max-width: 768px) {
            .report-layout-triple {
                overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 20px;
            }
            .report-layout-triple .result-block {
                flex: 0 0 85%; scroll-snap-align: center;
            }
        }

        .result-block { margin-bottom: 40px; border-left: 2px solid var(--gold-primary); padding-left: 20px; }
        .res-position { font-size: 0.65rem; color: var(--gold-primary); letter-spacing: 3px; margin-bottom: 8px; }
        .res-title { font-size: 1.2rem; margin-bottom: 12px; font-weight: 500; }
        .res-text { font-size: 0.95rem; line-height: 1.8; opacity: 0.85; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- 更新了專屬的水印名稱 -->
    <div class="watermark">by Grafittiii</div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Night Mode</button>

    <div id="loading-screen">
        <div class="loading-title">孫孫塔羅 Mascot Tarot</div>
        <div class="progress-track"><div id="progress-bar"></div></div>
    </div>

    <div id="main-page">
        <div>
            <div class="input-group">
                <div class="label">Your Query</div>
                <textarea id="q-input" rows="1" placeholder="寫下你的困惑 (選填)..."></textarea>
            </div>
            
            <div class="input-group">
                <div class="label">Category</div>
                <div class="grid-3">
                    <button class="btn-outline cat-btn" onclick="setCat(this, '學業')">學業</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '事業')">事業</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '愛情')">愛情</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '親友')">親友</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '健康')">健康</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '心靈')">心靈</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '旅程')">旅程</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '決策')">決策</button>
                    <button class="btn-outline cat-btn" onclick="setCat(this, '其他')">其他</button>
                </div>
            </div>

            <div id="relation-container">
                <span>是查問你與他/她的關係嗎？</span>
                <input type="checkbox" id="is-relation">
            </div>

            <div class="input-group" style="margin-top: 20px;">
                <div class="label">Spread Mode</div>
                <div class="grid-3" style="grid-template-columns: 1fr 1fr;">
                    <button class="btn-outline mode-btn active" id="btn-single" onclick="setMode('single')">單牌指引</button>
                    <button class="btn-outline mode-btn" id="btn-triple" onclick="setMode('triple')">三牌陣</button>
                </div>
            </div>
        </div>

        <button class="btn-solid" onclick="startDivination()">Start Divination</button>
    </div>

    <div id="spread-view" onclick="retractCards(event)">
        <div id="draw-counter">0/3</div>
        <div id="cards-container"></div>
        <button id="confirm-btn-float" class="btn-solid" style="width: auto;" onclick="confirmCard(event)">Confirm Selection</button>
    </div>

    <div id="result-panel">
        <div style="font-size:0.8rem; opacity:0.5; margin-bottom: 20px;" id="report-question"></div>
        <div id="report-content"></div>
        
        <div id="advice-section" style="display:none; margin-top:30px; border-top: var(--border-thin); padding-top: 30px;">
            <div class="label" style="margin-bottom:15px;">Guidance</div>
            <button class="btn-outline" style="width:100%; border-color:var(--gold-primary); color:var(--gold-primary);" onclick="drawAdvice()">需要追問/建議嗎？</button>
        </div>
        <div id="advice-content"></div>

        <button class="btn-solid" style="margin-top: 50px; background:transparent; border:1px solid var(--text-color); color:var(--text-color);" onclick="restartApp()">Return</button>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());

      const tarotData = [

            { id: "0", name: "愚者", img: "card0.png", element: "Air", type: "solo", gaze: "right",

                upright: { keywords: ["開始", "純真", "冒險"], general_meaning: "代表一個全新的開始，充滿無限可能與冒險精神。", spread_meanings: { past: "過去的大膽抉擇影響至今。", present: "現在是踏入新階段的時機。", future: "未來有意外的機遇。", my_view: "你充滿好奇與衝動。", their_view: "對方覺得你難以預測。", current_status: "輕鬆且不穩定的初期。" }, advice: "勇敢跳出舒適圈。" },

                reversed: { keywords: ["魯莽", "疏忽", "遲疑"], general_meaning: "警告不要衝動行事，或因為恐懼而停滯不前。", spread_meanings: { past: "過去的輕率造成了阻礙。", present: "當前猶豫不決錯失良機。", future: "前路可能存在風險。", my_view: "你感到迷茫且不安。", their_view: "對方覺得你缺乏責任感。", current_status: "計畫停滯不前。" }, advice: "在躍下前先看清腳下。" }

            },

            { id: "1", name: "魔術師", img: "card1.png", element: "Air", type: "solo", gaze: "forward",

                upright: { keywords: ["創造力", "意志", "顯化"], general_meaning: "你具備將夢想轉化為現實的所有資源與能力。", spread_meanings: { past: "過去的努力奠定了現有能力。", present: "展現才華的關鍵時刻。", future: "目標將在你的掌握中實現。", my_view: "你感到自信且有主控權。", their_view: "對方被你的才氣所吸引。", current_status: "充滿活力與溝通順暢。" }, advice: "善用你的天賦與資源。" },

                reversed: { keywords: ["操縱", "幻滅", "溝通不順"], general_meaning: "小心被誤導，或因缺乏專注而導致失敗。", spread_meanings: { past: "曾有過被誤導的經驗。", present: "感到力不從心或受挫。", future: "計畫可能遭遇變卦。", my_view: "你覺得事情失控了。", their_view: "對方覺得你不夠真誠。", current_status: "存在信息不對稱。" }, advice: "重新檢視你的動機。" }

            },

            { id: "2", name: "女教皇", img: "card2.png", element: "Water", type: "solo", gaze: "forward",

                upright: { keywords: ["直覺", "神秘", "內在智慧"], general_meaning: "暗示現在應跟隨直覺，而非表面邏輯。", spread_meanings: { past: "過去的靜觀積累了智慧。", present: "隱藏的真相即將顯露。", future: "答案會在潛意識中浮現。", my_view: "你正處於精神高度集中。", their_view: "對方覺得你很有層次。", current_status: "精神層面的深度交流。" }, advice: "靜觀其變，傾聽內心。" },

                reversed: { keywords: ["忽視直覺", "淺薄", "祕密洩漏"], general_meaning: "可能過於表面，或因忽視內心警告而犯錯。", spread_meanings: { past: "曾因過於理智而失策。", present: "情緒不穩定且焦慮。", future: "隱藏的阻礙將會曝光。", my_view: "你感到內心空洞。", their_view: "對方覺得你情緒化。", current_status: "信任感出現裂痕。" }, advice: "誠實面對你的潛意識。" }

            },

            { id: "3", name: "女皇", img: "card3.png", element: "Earth", type: "solo", gaze: "forward",

                upright: { keywords: ["豐盛", "母性", "自然"], general_meaning: "象徵創造力、繁榮與情感的滋養。", spread_meanings: { past: "過去的累積帶來現在的富足。", present: "生活正進入豐盛期。", future: "計畫將結出豐碩果實。", my_view: "你感到充滿愛與動力。", their_view: "對方覺得你溫暖可親。", current_status: "關係穩固且充滿生機。" }, advice: "溫柔地培育你的想法。" },

                reversed: { keywords: ["依賴", "窒息的愛", "創造力受阻"], general_meaning: "可能感到資源匱乏，或因過度保護而失去自由。", spread_meanings: { past: "過去的過度放縱留後患。", present: "感到被瑣事困擾而疲累。", future: "物質上可能出現短缺。", my_view: "你覺得付出得不到回報。", their_view: "對方覺得你控制欲強。", current_status: "情感失衡且停滯。" }, advice: "找回獨立，學會放手。" }

            },

            { id: "4", name: "皇帝", img: "card4.png", element: "Fire", type: "solo", gaze: "forward",

                upright: { keywords: ["權威", "結構", "穩定"], general_meaning: "代表紀律、領導力與穩定的結構。", spread_meanings: { past: "穩固的基礎是成功的關鍵。", present: "需要理智與果斷的決策。", future: "將會獲得長期的穩定。", my_view: "你希望掌握全局。", their_view: "對方視你為可靠的人。", current_status: "組織严密且有序發展。" }, advice: "運用邏輯與意志力。" },

                reversed: { keywords: ["專橫", "僵化", "缺乏自律"], general_meaning: "警告不要過於固執，或因缺乏秩序而失控。", spread_meanings: { past: "曾受困於嚴苛的規則。", present: "感到壓力過大或受制於人。", future: "結構可能因僵化而崩解。", my_view: "你覺得深受束縛。", their_view: "對方覺得你太霸道。", current_status: "權力鬥爭或管理不善。" }, advice: "放鬆控制，展現靈活性。" }

            },

            { id: "5", name: "教皇", img: "card5.png", element: "Earth", type: "solo", gaze: "forward",

                upright: { keywords: ["傳統", "信仰", "指引"], general_meaning: "尋求共識、學習與傳統價值觀的認同。", spread_meanings: { past: "傳統教育影響深遠。", present: "尋求專業建議或導師。", future: "將獲得社會或群體的認可。", my_view: "你追求精神的歸屬感。", their_view: "對方覺得你值得尊敬。", current_status: "穩定且符合規範的關係。" }, advice: "遵循已證實有效的路徑。" },

                reversed: { keywords: ["叛逆", "不合常規", "虛偽"], general_meaning: "挑戰現狀，或對傳統價值產生質疑。", spread_meanings: { past: "曾試圖打破現有的束縛。", present: "感到想法與大眾格格不入。", future: "面臨價值觀的重建。", my_view: "你想尋求改變與突破。", their_view: "對方覺得你離經叛道。", current_status: "溝通出現價值分歧。" }, advice: "思考你的真實信念。" }

            },

            },

            { id: "w4", name: "權杖四", img: "4 of Wands.png", element: "Fire", type: "group", gaze: "center",

                upright: { keywords: ["穩定", "家園", "慶典"], general_meaning: "象徵一個穩定的階段，具有安全感與歸屬感。", spread_meanings: { past: "穩固的基業為你遮風擋雨。", present: "享受階段性的平靜與快樂。", future: "將步入穩定發展或同居/結婚。", my_view: "你渴望安定的生活。", their_view: "對方覺得你很踏實可靠。", current_status: "和諧且具備長期潛力的關係。" }, advice: "享受當下的安寧與幸福。" },

                reversed: { keywords: ["內心不穩", "家庭摩擦", "儀式感缺失"], general_meaning: "表面平靜下潛藏著不安，或是期待的慶祝被延遲。", spread_meanings: { past: "曾有過根基動搖的經驗。", present: "對目前的安穩感到懷疑。", future: "預期的穩定可能會延後。", my_view: "你感到缺乏安全感。", their_view: "對方覺得關係變得乏味。", current_status: "有些小摩擦需要修復。" }, advice: "從內部尋找安定的力量。" }

            }

        ];

        let currentCategory = '';
        let spreadMode = 'single';
        let isRelationship = false;
        let shuffledDeck = [];
        let drawnCards = [];
        let poppedCardEl = null;

        window.onload = () => {
            document.fonts.ready.then(() => {
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 15;
                    document.getElementById('progress-bar').style.width = `${progress}%`;
                    if (progress >= 100) {
                        clearInterval(interval);
                        setTimeout(enterMainPage, 600);
                    }
                }, 100);
            });
        };

        function enterMainPage() {
            const loader = document.getElementById('loading-screen');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                const main = document.getElementById('main-page');
                main.style.visibility = 'visible';
                main.style.opacity = '1';
            }, 1000);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeBtn');
            if (html.getAttribute('data-theme') === 'day') {
                html.setAttribute('data-theme', 'night');
                btn.innerText = 'Day Mode';
            } else {
                html.setAttribute('data-theme', 'day');
                btn.innerText = 'Night Mode';
            }
        }

        function setCat(btn, cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = cat;
            
            const relBox = document.getElementById('relation-container');
            if (cat === '愛情' || cat === '親友') {
                relBox.style.display = 'flex';
            } else {
                relBox.style.display = 'none';
                document.getElementById('is-relation').checked = false;
            }
        }

        function setMode(mode) {
            spreadMode = mode;
            document.getElementById('btn-single').classList.remove('active');
            document.getElementById('btn-triple').classList.remove('active');
            document.getElementById(`btn-${mode}`).classList.add('active');
        }

        function updateCounterUI() {
            const counter = document.getElementById('draw-counter');
            if (spreadMode === 'triple') {
                counter.style.display = 'block';
                counter.innerText = `${drawnCards.length}/3`;
            } else {
                counter.style.display = 'none';
            }
        }

        function startDivination() {
            if (!currentCategory) {
                alert("請先選擇占卜範疇。");
                return;
            }
            isRelationship = document.getElementById('is-relation').checked;
            
            const main = document.getElementById('main-page');
            main.style.opacity = '0';
            setTimeout(() => {
                main.style.display = 'none';
                initSpreadView();
            }, 800);
        }

        function initSpreadView() {
            const spreadView = document.getElementById('spread-view');
            spreadView.style.display = 'block';
            setTimeout(() => spreadView.style.opacity = '1', 50);

            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            shuffledDeck = [...tarotData].sort(() => Math.random() - 0.5);
            drawnCards = [];
            updateCounterUI();

            const isMobile = window.innerWidth < 768;
            const total = shuffledDeck.length;

            shuffledDeck.forEach((cardData, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrap shuffling'; // 加入洗牌狀態
                wrapper.dataset.index = index;

                const imgTag = `<img src="${cardData.img}" style="width:100%; height:100%; object-fit:cover; border-radius:3px;" onerror="this.style.opacity='0';" draggable="false">`;

                wrapper.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-back"></div>
                        <div class="card-face card-front">${imgTag}</div>
                    </div>
                `;

                // 初始全數疊在畫面中央以配合洗牌動畫
                wrapper.style.left = "50%";
                wrapper.style.top = "50%";
                wrapper.style.transform = `translate(-50%, -50%)`;

                wrapper.onclick = (e) => handleCardClick(e, wrapper);
                container.appendChild(wrapper);
            });

            // 1.5秒洗牌動畫結束後，展成扇形
            setTimeout(() => {
                const cards = document.querySelectorAll('.card-wrap');
                cards.forEach((wrapper, index) => {
                    wrapper.classList.remove('shuffling');
                    wrapper.style.transition = 'transform 0.8s cubic-bezier(0.2, 1.2, 0.3, 1), left 0.8s, top 0.8s, bottom 0.8s';
                    
                    if (isMobile) {
                        const angle = -45 + (index * (90 / total)); 
                        wrapper.style.transformOrigin = "left center";
                        wrapper.style.left = "-10vw";
                        wrapper.style.top = "50%";
                        wrapper.style.transform = `translateY(-50%) rotate(${angle}deg) translateX(25vw)`;
                        // 設定凸出參數，向外（沿 X 軸外推）
                        wrapper.style.setProperty('--pop-x', '30px');
                        wrapper.style.setProperty('--pop-y', '0px');
                    } else {
                        const angle = -60 + (index * (120 / total));
                        wrapper.style.transformOrigin = "center bottom";
                        wrapper.style.left = "50%";
                        wrapper.style.top = "auto";
                        wrapper.style.bottom = "-20vh";
                        wrapper.style.transform = `translateX(-50%) rotate(${angle}deg) translateY(-25vh)`;
                        // 設定凸出參數，向外（沿 Y 軸上推）
                        wrapper.style.setProperty('--pop-x', '0px');
                        wrapper.style.setProperty('--pop-y', '-50px');
                    }
                });
            }, 1500);
        }

        function handleCardClick(e, wrapper) {
            e.stopPropagation();
            if (wrapper.classList.contains('confirmed') || wrapper.classList.contains('shuffling')) return;

            const btn = document.getElementById('confirm-btn-float');
            
            if (poppedCardEl === wrapper) return;

            if (poppedCardEl) {
                poppedCardEl.classList.remove('popped');
            }

            wrapper.classList.add('popped');
            poppedCardEl = wrapper;

            btn.style.display = 'block';
            setTimeout(() => {
                btn.style.opacity = '1';
                btn.style.transform = 'translateX(-50%) translateY(0)';
            }, 10);
        }

        function retractCards(e) {
            if (!e.target.closest('.card-wrap') && poppedCardEl) {
                poppedCardEl.classList.remove('popped');
                poppedCardEl = null;
                const btn = document.getElementById('confirm-btn-float');
                btn.style.opacity = '0';
                btn.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => btn.style.display = 'none', 400);
            }
        }

        function confirmCard(e) {
            e.stopPropagation();
            if (!poppedCardEl) return;

            const btn = document.getElementById('confirm-btn-float');
            btn.style.opacity = '0';
            setTimeout(() => btn.style.display = 'none', 400);

            const idx = parseInt(poppedCardEl.dataset.index);
            const cardData = shuffledDeck[idx];
            const isReversed = Math.random() > 0.5;
            drawnCards.push({ ...cardData, isReversed, elementDOM: poppedCardEl });

            poppedCardEl.classList.remove('popped');
            poppedCardEl.classList.add('confirmed');
            poppedCardEl = null;

            updateCounterUI();

            const requiredLimit = spreadMode === 'single' ? 1 : 3;
            if (drawnCards.length >= requiredLimit) {
                // 等待確認動畫稍縱即逝後執行翻牌大序列
                setTimeout(finalizeSelection, 300);
            }
        }

        function finalizeSelection() {
            const counter = document.getElementById('draw-counter');
            if (counter) counter.style.display = 'none';

            // 隱藏未選卡牌
            document.querySelectorAll('.card-wrap:not(.confirmed)').forEach(el => {
                el.style.opacity = '0';
                el.style.pointerEvents = 'none';
            });

            const totalWidth = window.innerWidth;
            const totalCards = drawnCards.length;

            // 階段一：解除扇形，置中並垂直排列
            drawnCards.forEach((drawn, i) => {
                const el = drawn.elementDOM;
                el.classList.remove('confirmed');
                el.style.opacity = '1';
                el.style.transition = 'all 0.8s cubic-bezier(0.25, 1, 0.5, 1)';
                
                // 計算並排在中間的水平位移
                const centerOffsetX = (i - (totalCards - 1) / 2) * (window.innerWidth < 768 ? 75 : 100); 
                
                el.style.transformOrigin = "center center";
                el.style.left = `calc(50% + ${centerOffsetX}px)`;
                el.style.top = `50%`;
                el.style.bottom = 'auto';
                // 取消所有角度，回歸垂直正向
                el.style.transform = `translate(-50%, -50%) rotate(0deg)`;
            });

            // 階段二：觸發翻牌動畫 (待置中動畫完成後)
            setTimeout(() => {
                drawnCards.forEach((drawn) => {
                    const inner = drawn.elementDOM.querySelector('.card-inner');
                    inner.style.transition = 'transform 0.8s ease';
                    const rotation = drawn.isReversed ? 'rotateY(180deg) rotateZ(180deg)' : 'rotateY(180deg)';
                    inner.style.transform = rotation;
                });
            }, 1000);

            // 階段三：飛至頂端展示區
            setTimeout(() => {
                drawnCards.forEach((drawn, i) => {
                    const el = drawn.elementDOM;
                    const offset = (totalWidth / (totalCards + 1)) * (i + 1);
                    el.style.left = `${offset}px`;
                    el.style.top = `8%`;
                    el.style.transform = `translate(-50%, 0) rotate(0deg)`;
                });
            }, 2200);

            // 階段四：拉出解說面板
            setTimeout(generateReport, 3200);
        }

        function generateReport() {
            const panel = document.getElementById('result-panel');
            const content = document.getElementById('report-content');
            const qStr = document.getElementById('q-input').value.trim();
            
            document.getElementById('report-question').innerText = qStr ? `你的提問：${qStr}` : `占卜範疇：${currentCategory}`;

            let html = '';
            const isTriple = spreadMode === 'triple';
            
            const tripleLabels = (isRelationship && (currentCategory === '愛情' || currentCategory === '親友')) 
                ? [{label: '我的看法', key: 'my_view'}, {label: '對方的看法', key: 'their_view'}, {label: '現況', key: 'current_status'}]
                : [{label: '過去', key: 'past'}, {label: '現在', key: 'present'}, {label: '未來', key: 'future'}];

            drawnCards.forEach((card, i) => {
                const stateData = card.isReversed ? card.reversed : card.upright;
                const posLabel = !isTriple ? '核心指引' : tripleLabels[i].label;
                const meaningText = !isTriple ? stateData.general_meaning : stateData.spread_meanings[tripleLabels[i].key];

                html += `
                    <div class="result-block">
                        <div class="res-position">${posLabel}</div>
                        <div class="res-title">${card.name} ${card.isReversed ? '(逆位)' : '(正位)'}</div>
                        <div class="res-position" style="color:var(--text-color); opacity:0.6;">Keywords: ${stateData.keywords.join(' / ')}</div>
                        <div class="res-text">${meaningText}</div>
                    </div>
                `;
            });

            // 如果是三牌陣，套用左中右的橫向或滑動佈局
            content.innerHTML = isTriple ? `<div class="report-layout-triple">${html}</div>` : html;
            panel.classList.add('active');
            
            document.getElementById('advice-section').style.display = 'block';
        }

        function drawAdvice() {
            document.getElementById('advice-section').style.display = 'none'; 
            
            const usedIds = drawnCards.map(c => c.id);
            const remaining = tarotData.filter(c => !usedIds.includes(c.id));
            if (remaining.length === 0) return;

            const advCard = remaining[Math.floor(Math.random() * remaining.length)];
            const isReversed = Math.random() > 0.5;
            const stateData = isReversed ? advCard.reversed : advCard.upright;

            const html = `
                <div class="result-block" style="border-color: var(--text-color); padding-left: 15px;">
                    <div class="res-position" style="color: var(--text-color);">追加建議</div>
                    <div class="res-title">${advCard.name} ${isReversed ? '(逆位)' : '(正位)'}</div>
                    <div class="res-text"><strong>箴言：</strong>${stateData.advice}</div>
                </div>
            `;
            
            const target = document.getElementById('advice-content');
            target.innerHTML = html;
            target.style.opacity = '0';
            target.style.animation = 'fadeIn 1s ease forwards';
        }

        function restartApp() {
            document.getElementById('result-panel').classList.remove('active');
            document.getElementById('spread-view').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('spread-view').style.display = 'none';
                document.getElementById('cards-container').innerHTML = '';
                document.getElementById('advice-content').innerHTML = '';
                document.getElementById('advice-section').style.display = 'none';
                
                const main = document.getElementById('main-page');
                main.style.display = 'flex';
                setTimeout(() => main.style.opacity = '1', 100);
            }, 900);
        }
    </script>
</body>
</html>
